{% extends "orders.html" %}

{% block add_button %}
<a class="uk-button uk-button-primary uk-width-1-1 uk-margin-bottom" style="font-family: Times New Roman;
                    background-color: #00FA9A; color: black; border: 1px solid black;"
                    href="{% url 'add_order' %}">Добавить заказ</a>
{% endblock %}

{% block edit_delete %}
<div class="uk-margin-top uk-flex">
    <a href="{% url 'edit_order' order.id %}" class="uk-button uk-button-primary uk-width-1-2" style="font-family: Times New Roman;
                    background-color: #00FA9A; color: black; border: 1px solid black;">Редактировать</a>
    <a href="{% url 'delete_order' order.id %}" class="uk-button uk-button-primary uk-width-1-2 uk-margin-left" style="font-family: Times New Roman;
                    background-color: #00FA9A; color: black; border: 1px solid black;">Удалить</a>
</div>
{% endblock %}
